<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEOPN — Police Nationale</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#1a237e;--accent2:#3949ab;--bg-dark:#07111c;--bg-mid:#0a1020;
  --bg-panel:#0d1628;--sidebar-bg:#090f1e;--sidebar-border:rgba(255,255,255,.06);
  --text-main:#e8edf5;--text-muted:#6b80aa;--text-dim:#3a4d6a;
  --border:#172040;--content-bg:#0b1525;--card-bg:#0d1830;--card-border:#192444;
  --green:#22c55e;--red:#ef4444;--orange:#f59e0b;--blue:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Barlow',sans-serif}
html,body{height:100%;overflow:hidden}
body{background:var(--bg-dark)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(26,35,126,.2) 0%,transparent 55%),radial-gradient(ellipse at 80% 15%,rgba(57,73,171,.1) 0%,transparent 50%);pointer-events:none;z-index:0}
#login-screen{position:relative;z-index:1;height:100vh;display:none;align-items:center;justify-content:center;flex-direction:column}
.lbox{background:rgba(9,15,30,.96);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(20px);animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.llogo{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:20px}
.llogo-icon{width:56px;height:56px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.1);background:var(--bg-mid);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.llogo-icon img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.llogo-text{font-size:16px;font-weight:700;line-height:1.25;color:#fff;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.llogo-text span{font-size:11px;font-weight:400;color:var(--text-muted);display:block;letter-spacing:.3px}
.ltitle{text-align:center;font-size:20px;font-weight:800;margin-bottom:6px;color:#fff;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
.ldivider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:16px 0 20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.fg input{width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:13px;outline:none;background:rgba(255,255,255,.04);color:#fff;transition:all .2s;font-family:'Barlow',sans-serif}
.fg input::placeholder{color:var(--text-dim)}
.fg input:focus{border-color:var(--accent2);background:rgba(57,73,171,.08);box-shadow:0 0 0 3px rgba(57,73,171,.15)}
.btn-login{width:100%;background:linear-gradient(135deg,#1a237e,#3949ab);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;letter-spacing:.5px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;transition:all .2s;box-shadow:0 4px 16px rgba(57,73,171,.3)}
.btn-login:hover{opacity:.9;transform:translateY(-1px)}
.lerr{color:#f87171;font-size:12px;margin-top:8px;text-align:center;display:none}
.lback{color:var(--text-muted);font-size:11px;cursor:pointer;text-align:center;display:block;margin-top:16px;transition:color .2s}
.lback:hover{color:#fff}
#app{display:none;height:100vh;flex-direction:column;position:relative;z-index:1}
#fondateur-bar{background:rgba(0,0,0,.6);color:#fcd34d;padding:6px 20px;font-size:11px;display:none;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid rgba(252,211,77,.15);font-family:'Barlow Condensed',sans-serif;letter-spacing:.4px}
.topbar{display:flex;align-items:center;padding:0 20px;height:56px;gap:16px;flex-shrink:0;background:rgba(9,15,30,.95);border-bottom:1px solid var(--sidebar-border);backdrop-filter:blur(12px)}
.topbar-brand{color:#fff;font-weight:800;font-size:15px;display:flex;align-items:center;gap:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase}
.topbar-logo{width:34px;height:34px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,.15);background:var(--bg-mid);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.topbar-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.topbar-divider{width:1px;height:22px;background:var(--sidebar-border)}
.topbar-search{flex:1;max-width:300px}
.topbar-search input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:7px 16px;color:#fff;font-size:12px;outline:none;font-family:'Barlow',sans-serif;transition:all .2s}
.topbar-search input:focus{border-color:var(--accent2);background:rgba(255,255,255,.08)}
.topbar-search input::placeholder{color:var(--text-dim)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.topbar-user{color:var(--text-main);font-size:12px;font-weight:600;cursor:pointer;padding:6px 12px;border-radius:8px;position:relative;display:flex;align-items:center;gap:8px;border:1px solid transparent;transition:all .2s}
.topbar-user:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.topbar-user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.udrop{position:absolute;top:48px;right:0;background:#0d1628;border:1px solid var(--card-border);border-radius:14px;padding:16px;min-width:240px;z-index:999;display:none;box-shadow:0 16px 48px rgba(0,0,0,.7)}
.udrop.open{display:block}
.udrop-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.udrop-meta{font-size:11px;color:var(--text-muted);margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.udrop-grade-img{width:44px;height:44px;object-fit:contain;background:rgba(255,255,255,.05);border-radius:8px;padding:3px;display:block;margin-bottom:8px;border:1px solid var(--border)}
.udrop-row{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.udrop-row strong{color:var(--text-main)}
.btn-logout{width:100%;background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:8px;font-size:12px;cursor:pointer;font-weight:700;margin-top:10px;letter-spacing:.4px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;transition:all .2s}
.btn-logout:hover{background:rgba(239,68,68,.22)}
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 56px)}
.sidebar{width:230px;overflow-y:auto;flex-shrink:0;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border)}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-section{padding:18px 14px 6px;font-size:9px;font-weight:700;color:var(--text-dim);letter-spacing:1.2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-radius:8px;margin:1px 8px;font-size:12px;font-weight:600;color:var(--text-muted);transition:all .15s;letter-spacing:.2px}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--text-main)}
.nav-item.active{color:#fff;background:linear-gradient(135deg,rgba(26,35,126,.8),rgba(57,73,171,.5));border:1px solid rgba(57,73,171,.3)}
.nav-item .ni{font-size:13px;width:18px;text-align:center;flex-shrink:0;opacity:.8}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px}
.content{flex:1;overflow-y:auto;padding:22px;background:var(--content-bg)}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.page-title{font-size:22px;font-weight:800;margin-bottom:3px;color:#fff;font-family:'Barlow Condensed',sans-serif;letter-spacing:.8px;text-transform:uppercase}
.page-sub{font-size:12px;color:var(--text-muted);margin-bottom:18px;letter-spacing:.2px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:16px}
.card{background:var(--card-bg);border-radius:14px;border:1px solid var(--card-border);padding:16px;transition:all .2s}
.card:hover{border-color:rgba(57,73,171,.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-icon{font-size:20px;margin-bottom:8px;opacity:.85}
.card-title{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--text-main);font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}
.card-desc{font-size:11px;color:var(--text-muted);line-height:1.5}
.cbtn{margin-top:10px;color:#fff;border:none;border-radius:7px;padding:6px 13px;font-size:11px;cursor:pointer;font-weight:700;display:inline-block;letter-spacing:.3px;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;transition:all .15s}
.cbtn:hover{opacity:.85;transform:translateY(-1px)}
.cbtn.navy{background:linear-gradient(135deg,#1a237e,#3949ab)}
.cbtn.green{background:linear-gradient(135deg,#166534,#22c55e)}
.cbtn.red{background:linear-gradient(135deg,#7f1d1d,#ef4444)}
.cbtn.blue{background:linear-gradient(135deg,#1e40af,#3b82f6)}
.cbtn.orange{background:linear-gradient(135deg,#92400e,#f59e0b)}
.cbtn.dark{background:linear-gradient(135deg,#111,#333)}
.tw{background:var(--card-bg);border-radius:14px;border:1px solid var(--card-border);overflow:hidden;margin-bottom:14px}
.th{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between;color:var(--text-main);font-family:'Barlow Condensed',sans-serif;letter-spacing:.4px;text-transform:uppercase;background:rgba(255,255,255,.02)}
table{width:100%;border-collapse:collapse}
th{background:rgba(255,255,255,.02);padding:9px 14px;font-size:10px;font-weight:700;color:var(--text-dim);text-align:left;border-bottom:1px solid var(--border);letter-spacing:.8px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
td{padding:10px 14px;font-size:12px;color:var(--text-main);border-bottom:1px solid rgba(255,255,255,.03)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.03)}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.st{background:var(--card-bg);border-radius:12px;border:1px solid var(--card-border);padding:14px;text-align:center;position:relative;overflow:hidden}
.st::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(57,73,171,.06) 0%,transparent 60%);pointer-events:none}
.st-n{font-size:28px;font-weight:800;color:#fff;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.st-l{font-size:10px;color:var(--text-muted);margin-top:3px;letter-spacing:.4px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.b{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.3px;font-family:'Barlow Condensed',sans-serif}
.b-blue{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.2)}
.b-green{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.2)}
.b-red{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.b-orange{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.2)}
.b-gray{background:rgba(255,255,255,.06);color:var(--text-muted);border:1px solid rgba(255,255,255,.08)}
.b-purple{background:rgba(168,85,247,.12);color:#d8b4fe;border:1px solid rgba(168,85,247,.2)}
.fc{background:var(--card-bg);border-radius:14px;border:1px solid var(--card-border);padding:18px;margin-bottom:14px}
.ft{font-size:13px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;color:var(--text-main);font-family:'Barlow Condensed',sans-serif;letter-spacing:.4px;text-transform:uppercase}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:10px;color:var(--text-muted);font-weight:700;margin-bottom:5px;letter-spacing:.6px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}
.fr input,.fr select,.fr textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;outline:none;background:rgba(255,255,255,.04);color:#fff;font-family:'Barlow',sans-serif;transition:all .2s}
.fr input::placeholder,.fr textarea::placeholder{color:var(--text-dim)}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--accent2);background:rgba(57,73,171,.06);box-shadow:0 0 0 3px rgba(57,73,171,.1)}
.fr select option{background:#0d1628;color:#fff}
.fr-row{display:flex;gap:10px}.fr-row .fr{flex:1}
.fr-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);color:var(--text-dim);font-family:'Barlow Condensed',sans-serif}
.al{border-radius:10px;padding:11px 16px;margin-bottom:12px;font-size:12px;display:flex;align-items:center;gap:10px;font-weight:500}
.al-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.al-blue{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#93c5fd}
.al-green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#86efac}
.al-orange{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px}
.mb{background:#0d1628;border:1px solid var(--card-border);border-radius:18px;padding:24px;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.mb::-webkit-scrollbar{width:3px}.mb::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mt{font-size:15px;font-weight:800;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;color:#fff;font-family:'Barlow Condensed',sans-serif;letter-spacing:.6px;text-transform:uppercase}
.mc{cursor:pointer;font-size:16px;color:var(--text-muted);background:rgba(255,255,255,.06);border:none;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.mc:hover{background:rgba(255,255,255,.1);color:#fff}
.profil-card{background:var(--card-bg);border-radius:14px;border:1px solid var(--card-border);padding:20px;display:flex;gap:18px;align-items:flex-start;margin-bottom:14px}
.profil-img{width:72px;height:72px;object-fit:contain;background:rgba(255,255,255,.05);border-radius:10px;padding:4px;flex-shrink:0;border:1px solid var(--border)}
.profil-info h2{font-size:18px;font-weight:800;margin-bottom:4px;color:#fff;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.profil-info p{font-size:12px;color:var(--text-muted);margin-bottom:2px}
.profil-rio{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;margin-top:6px;background:rgba(57,73,171,.2);color:#a5b4fc;border:1px solid rgba(57,73,171,.3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.grades-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.grade-card{background:var(--card-bg);border-radius:12px;border:1px solid var(--card-border);padding:14px;text-align:center;transition:all .2s}
.grade-card:hover{border-color:rgba(57,73,171,.5);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
.grade-img-sm{width:52px;height:52px;object-fit:contain;margin:0 auto 8px;display:block;border-radius:8px;padding:3px;background:rgba(255,255,255,.04);border:1px solid var(--border)}
.grade-name-sm{font-size:10px;font-weight:700;line-height:1.3;color:var(--text-main);font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}
.grade-code-sm{font-size:9px;color:var(--text-dim);margin-top:2px;letter-spacing:.5px}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;display:none;color:#fff;font-family:'Barlow Condensed',sans-serif;letter-spacing:.4px;text-transform:uppercase;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.perm-tag{display:inline-block;background:rgba(168,85,247,.1);color:#d8b4fe;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin:2px;border:1px solid rgba(168,85,247,.2);font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}
.module-card{background:var(--card-bg);border-radius:12px;border:1px solid var(--card-border);padding:16px;margin-bottom:12px;transition:border-color .2s}
.module-card:hover{border-color:rgba(57,73,171,.4)}
.module-img{width:100%;border-radius:8px;object-fit:cover;max-height:140px;margin-bottom:10px;display:block}

/* ===== THEME JOUR ===== */
:root[data-theme="light"]{
  --accent:#1a237e;
  --accent2:#3949ab;
  --bg-dark:#eef1f9;
  --bg-mid:#e4e9f5;
  --bg-panel:#dde4f2;
  --sidebar-bg:#f0f3fb;
  --sidebar-border:rgba(0,0,0,.08);
  --text-main:#111827;
  --text-muted:#4a567a;
  --text-dim:#8090b8;
  --border:#ccd3e8;
  --content-bg:#e8edf8;
  --card-bg:#ffffff;
  --card-border:#d2daf0;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#d97706;
  --blue:#2563eb;
}
:root[data-theme="light"] body::before{
  background:radial-gradient(ellipse at 20% 50%,rgba(26,35,126,.05) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 15%,rgba(57,73,171,.03) 0%,transparent 50%);
}
:root[data-theme="light"] .lbox{background:rgba(255,255,255,.98);border-color:rgba(0,0,0,.08);box-shadow:0 32px 80px rgba(0,0,0,.12)}
:root[data-theme="light"] .fg input{background:#f5f7ff;color:#111;border-color:var(--border)}
:root[data-theme="light"] .fg input::placeholder{color:var(--text-dim)}
:root[data-theme="light"] .llogo-text{color:#111}
:root[data-theme="light"] .ltitle{color:#111}
:root[data-theme="light"] .topbar{background:rgba(240,243,251,.96)}
:root[data-theme="light"] .topbar-search input{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);color:#111}
:root[data-theme="light"] .topbar-search input::placeholder{color:var(--text-dim)}
:root[data-theme="light"] .topbar-user{color:var(--text-main)}
:root[data-theme="light"] .topbar-user:hover{background:rgba(0,0,0,.05)}
:root[data-theme="light"] .topbar-brand,:root[data-theme="light"] #tb-brand{color:#1a237e!important}
:root[data-theme="light"] .sidebar{background:var(--sidebar-bg)}
:root[data-theme="light"] .nav-item{color:var(--text-muted)}
:root[data-theme="light"] .nav-item:hover{background:rgba(26,35,126,.07)}
:root[data-theme="light"] .nav-item.active{color:#fff;background:linear-gradient(135deg,rgba(26,35,126,.9),rgba(57,73,171,.8))}
:root[data-theme="light"] .sidebar-section{color:var(--text-dim)}
:root[data-theme="light"] .udrop{background:#fff;border-color:var(--border)}
:root[data-theme="light"] .udrop-name{color:#111}
:root[data-theme="light"] .udrop-row{color:var(--text-muted)}
:root[data-theme="light"] .udrop-row strong{color:var(--text-main)}
:root[data-theme="light"] .mb{background:#fff;border-color:var(--border)}
:root[data-theme="light"] .mt{color:#111;border-color:var(--border)}
:root[data-theme="light"] .mc{background:rgba(0,0,0,.06)}
:root[data-theme="light"] .mc:hover{background:rgba(0,0,0,.12);color:#111}

// ============================================================
// FIREBASE HELPERS — ROBUSTES
// ============================================================
async function dbGet(col,filters=[]){
  try{
    let q=db.collection(col);
    filters.forEach(([f,op,v])=>q=q.where(f,op,v));
    let s=await q.get();
    return s.docs.map(d=>({id:d.id,...d.data()}));
  }catch{
    let data=MEM[col]||[];
    if(filters.length){
      data=data.filter(item=>filters.every(([f,,v])=>item[f]===v));
    }
    return data;
  }
}
async function dbAdd(col,data){
  try{
    let r=await db.collection(col).add({...data,_ts:firebase.firestore.FieldValue.serverTimestamp()});
    let newItem={id:r.id,...data,_ts:new Date().toISOString()};
    if(!MEM[col])MEM[col]=[];
    MEM[col].unshift(newItem);
    return r.id;
  }catch{
    let id=uid();
    if(!MEM[col])MEM[col]=[];
    MEM[col].unshift({id,...data,_ts:new Date().toISOString()});
    return id;
  }
}
async function dbSet(col,id,data){
  try{
    await db.collection(col).doc(id).set(data,{merge:true});
  }catch{}
  if(!MEM[col])MEM[col]=[];
  let i=MEM[col].findIndex(x=>x.id===id);
  if(i>=0)MEM[col][i]={...MEM[col][i],...data};
  else MEM[col].push({id,...data});
}
async function dbUpdate(col,id,data){
  try{
    await db.collection(col).doc(id).update(data);
  }catch{}
  if(!MEM[col])MEM[col]=[];
  let i=MEM[col].findIndex(x=>x.id===id);
  if(i>=0)Object.assign(MEM[col][i],data);
}
async function dbDelete(col,id){
  try{await db.collection(col).doc(id).delete();}catch{}
  if(MEM[col])MEM[col]=MEM[col].filter(x=>x.id!==id);
}
async function dbGetOne(col,id){
  try{
    let d=await db.collection(col).doc(id).get();
    if(d.exists){
      let item={id:d.id,...d.data()};
      if(!MEM[col])MEM[col]=[];
      let i=MEM[col].findIndex(x=>x.id===id);
      if(i>=0)MEM[col][i]=item;else MEM[col].push(item);
      return item;
    }
  }catch{}
  return (MEM[col]||[]).find(x=>x.id===id)||null;
}
async function incrStat(field,n=1){
  let key='stats_'+SERVICE;
  if(!MEM[key])MEM[key]={};
  MEM[key][field]=(MEM[key][field]||0)+n;
  try{
    await db.collection('stats').doc(SERVICE).set({[field]:firebase.firestore.FieldValue.increment(n)},{merge:true});
  }catch{}
}
async function sendWebhook(url,payload){
  try{await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}
  catch(e){console.warn('Webhook failed:',e);}
}

async function loadGradesForService(svc){
  let defaults=svc==='gn'?GRADES_GN:GRADES_PN;
  try{
    let gs=await db.collection('grades').where('service','==',svc).get();
    if(!gs.empty){
      let fbGrades=gs.docs.map(d=>({id:d.id,...d.data()}));
      let merged=[...defaults];
      fbGrades.forEach(fg=>{
        let i=merged.findIndex(g=>g.code===fg.code);
        if(i>=0) merged[i]={...merged[i],...fg};
        else merged.push(fg);
      });
      GRADES=merged.sort((a,b)=>(a.order||99)-(b.order||99));
      return;
    }
  }catch(e){console.warn('loadGrades error:',e);}
  GRADES=[...defaults];
}

async function doLogin(){
  let id=$('lid').value.trim();
  let pw=$('lpw').value;
  if(!id||!pw){$('lerr').textContent='Remplissez tous les champs.';$('lerr').style.display='block';return;}
  let u=null;

  // Vérifier fondateur d'abord
  if(SERVICE==='fondateur'){
    let du=DEMO_USERS['fondateur'];
    if(du&&du.pw===pw) u={uid:'fondateur',identifiant:id,...du};
  }

  // Cherche dans Firebase
  if(!u){
    try{
      let snap=await db.collection('users').where('identifiant','==',id).where('service','==',SERVICE).limit(1).get();
      if(!snap.empty){let d=snap.docs[0];let data=d.data();if(data.password===pw)u={uid:d.id,...data};}
    }catch{}
  }

  // Fallback démo
  if(!u){
    let du=DEMO_USERS[id];
    if(du&&du.pw===pw&&du.service===SERVICE) u={uid:id,identifiant:id,...du};
  }

  if(!u){$('lerr').textContent='Identifiant ou mot de passe incorrect.';$('lerr').style.display='block';return;}
  CU=u;
  $('lerr').style.display='none';
  await loadGradesForService(SERVICE||'pn');
  $('login-screen').style.display='none';
  buildApp();
}

  CU=null;SERVICE=null;GRADES=[];

}

function nav(page,icon,label,bdg=''){

}
function sec(t){return`<div class="sidebar-section">${t}</div>`;}

function renderPage(page){
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.remove('active');
    n.style.background='';n.style.color='';
  });
  let ni=$(`ni-${page}`);
  if(ni) ni.classList.add('active');
  $('udrop').classList.remove('open');
  let fn=PAGES[page]||PAGES['dashboard'];
  $('content').innerHTML='<div style="padding:40px;text-align:center;color:var(--text-dim);font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.5px">Chargement…</div>';
  fn();
}

    nom:$('pf-nom').value,prenom:$('pf-prenom').value,ddn:$('pf-ddn').value,nat:$('pf-nat').value,
    faits:$('pf-faits').value,natinf:$('pf-natinf').value,dfaits:$('pf-dfaits').value,lfaits:$('pf-lfaits').value,
    obs:$('pf-obs').value,statut:'En cours',service:SERVICE,auteurNom:CU.nom+' '+CU.prenom,auteurRio:CU.rio||CU.uid};
  if(!data.titre){showToast('Titre requis',false);return;}
  await dbAdd('procedures',data);await incrStat('procedures');
  showToast('Procédure enregistrée !');closeModal('modal-proc');renderPage('judiciaire');
}
async function viewProc(id){
  let x=await dbGetOne('procedures',id);if(!x)return;
  window._vProcId=id;
  $('proc-view-body').innerHTML=procHTML(x);openModal('modal-view-proc');
}
function procHTML(x){
  let row=(l,v)=>`<tr><td style="padding:5px 0;color:#666;font-weight:600;width:180px">${l}</td><td>${v||'—'}</td></tr>`;
  return`<table style="width:100%;font-size:12px;border-collapse:collapse">
    ${row('Type',x.type)}${row('Nature',x.titre)}${row('Parquet',x.parquet)}
    ${row('Mis en cause',`${x.nom||''} ${x.prenom||''}`)}${row('DDN',x.ddn)}${row('Nationalité',x.nat)}
    ${row('Faits',x.faits)}${row('NATINF',x.natinf)}${row('Date des faits',x.dfaits)}${row('Lieu',x.lfaits)}
    ${row('Observations',x.obs)}${row('Rédacteur',x.auteurNom)}${row('Statut',x.statut)}
  </table>`;
}
async function delProc(id){
  if(!confirm2('⚠️ Supprimer cette procédure ? Action irréversible.'))return;
  await dbDelete('procedures',id);showToast('Supprimée.');renderPage('judiciaire');
}

async function rechercheRapide(){
  let nom=$('rq-nom').value.toLowerCase();
  let prenom=$('rq-prenom').value.toLowerCase();
  let el=$('rq-res');el.innerHTML='<div style="color:#888;font-size:12px">Recherche…</div>';
  let results=[];
  for(let col of['fpr','taj']){
    let all=await dbGet(col);
    all.forEach(x=>{
      if((!nom||(x.nom||'').toLowerCase().includes(nom))&&(!prenom||(x.prenom||'').toLowerCase().includes(prenom)))
        results.push({...x,_col:col});
    });
  }
  if(!results.length){el.innerHTML='<div style="color:#888;font-size:12px">Aucun résultat.</div>';return;}
  el.innerHTML=results.map(x=>`<div style="background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:10px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">
    <div><strong>${x.nom} ${x.prenom}</strong> ${badge(x._col.toUpperCase(),'blue')}<br><span style="font-size:11px;color:#666">DDN: ${x.ddn||'—'} | Roblox: ${x.roblox||'—'}</span></div>
    <button class="cbtn navy" onclick="viewFiche('${x._col}','${x.id}')">Voir fiche</button>
  </div>`).join('');
}
async function viewFiche(col,id){
  let x=await dbGetOne(col,id);if(!x)return;
  let row=(l,v)=>`<tr><td style="padding:5px 0;color:#666;font-weight:600;width:160px">${l}</td><td>${v||'—'}</td></tr>`;
  let html=`<table style="width:100%;font-size:12px;border-collapse:collapse">
    ${row('Nom',x.nom)}${row('Prénom',x.prenom)}${row('DDN',x.ddn)}${row('Lieu naissance',x.lnais)}${row('Nationalité',x.nat)}`;
  if(col==='taj')html+=row('Sexe',x.sexe)+row('Poids/Taille',(x.poids||'—')+' kg / '+(x.taille||'—')+' cm')+row('FNAEG',x.fnaeg)+(x.photo?`<tr><td>Photo</td><td><img src="${x.photo}" style="max-width:100px;border-radius:4px" onerror="this.style.display='none'"></td></tr>`:'');
  if(col==='foves')html+=row('Marque/Modèle',(x.marque||'')+(x.modele?' '+x.modele:''))+row('Plaque',x.plaque)+row('Couleur',x.couleur)+row('Dommages',x.dommages)+row('Propriétaire',x.propNom);
  html+=row('Pseudo Roblox',x.roblox)+row('Pseudo Discord',x.discord)+row('Raison',x.raison)+row('Agent',x.agent)+row('Matricule',x.matricule)+'</table>';
  openModalDyn('Fiche '+col.toUpperCase()+' — '+x.nom+' '+(x.prenom||''),html+`<div style="margin-top:10px;display:flex;gap:8px"><button class="cbtn red" onclick="delFiche('${col}','${id}')">Supprimer</button><button class="cbtn red" onclick="closeModal('modal-dyn')">Fermer</button></div>`);
}

async function adminCreateUser(){
  let id=$('cu-id').value.trim();let pw=$('cu-pw').value;
  if(!id||!pw||!$('cu-nom').value){showToast('Champs obligatoires manquants',false);return;}
  let apts={};
  (MEM.aptitudes[SERVICE]||[]).forEach(a=>{
    let el=$(`cu-apt-${a.replace(/\s/g,'_')}`);if(el)apts[a]=el.checked;
  });
  let aptKey=SERVICE==='pn'?'Apte CIC':'Apte CORG';
  let data={identifiant:id,password:pw,nom:$('cu-nom').value,prenom:$('cu-prenom').value,rio:$('cu-rio').value,ddn:$('cu-ddn').value,ecoles:$('cu-ecoles').value,grade:$('cu-grade').value,role:$('cu-role').value,service:SERVICE,
    aptCorg:apts[aptKey]||false,aptRh:apts['Apte RH']||false,formateur:apts['Formateur']||false,aptOPJ:apts['OPJ']||false};
  await dbSet('users',id,data);DEMO_USERS[id]=data;
  showToast('Compte créé !');closeModal('modal-cu');renderPage('admin');
}
async function openEditUser(uid){
  let x=await dbGetOne('users',uid);if(!x){x=DEMO_USERS[uid];}if(!x)return;
  $('eu-uid').value=uid;$('eu-nom').value=x.nom||'';$('eu-prenom').value=x.prenom||'';
  $('eu-rio').value=x.rio||'';$('eu-ddn').value=x.ddn||'';$('eu-ecoles').value=x.ecoles||'';
  $('eu-grade').value=x.grade||'';$('eu-role').value=x.role||'AGENT';
  $('eu-corg').checked=x.aptCorg||false;$('eu-rh').checked=x.aptRh||false;
  $('eu-form').checked=x.formateur||false;$('eu-opj').checked=x.aptOPJ||false;
  $('eu-pw').value='';openModal('modal-eu');
}
async function adminSaveUser(){
  let uid=$('eu-uid').value;
  let up={nom:$('eu-nom').value,prenom:$('eu-prenom').value,rio:$('eu-rio').value,ddn:$('eu-ddn').value,ecoles:$('eu-ecoles').value,grade:$('eu-grade').value,role:$('eu-role').value,aptCorg:$('eu-corg').checked,aptRh:$('eu-rh').checked,formateur:$('eu-form').checked,aptOPJ:$('eu-opj').checked};
  let pw=$('eu-pw').value;if(pw)up.password=pw;
  await dbUpdate('users',uid,up);if(DEMO_USERS[uid])Object.assign(DEMO_USERS[uid],up);

}
async function delUser(uid){
  if(!confirm2('Supprimer ce compte ?'))return;

function showModal(id,title,body){
  return`<div id="${id}" class="mo" style="display:none" onclick="if(event.target===this)closeModal('${id}')">
    <div class="mb"><div class="mt">${title}<button class="mc" onclick="closeModal('${id}')">✕</button></div>${body}</div>
  </div>`;}
function openModal(id){let el=$(id);if(el)el.style.display='flex';}
function closeModal(id){let el=$(id);if(el)el.style.display='none';}
function openModalDyn(title,body){
  let m=$('modal-dyn');
  if(!m){m=document.createElement('div');m.id='modal-dyn';m.className='mo';m.onclick=function(e){if(e.target===m)closeModal('modal-dyn');};document.body.appendChild(m);}
  m.innerHTML=`<div class="mb"><div class="mt">${title}<button class="mc" onclick="closeModal('modal-dyn')">✕</button></div>${body}</div>`;
  m.style.display='flex';
}

// INIT

window.onload=async function(){
  // Charger config globale
  try{
    let cfg=await dbGetOne('config','webhooks');if(cfg)Object.assign(MEM.webhooks,cfg);
    let ti=await dbGetOne('config','typeInterventions');if(ti)MEM.typeInterventions=ti;
    let aptsGN=await dbGetOne('aptitudes','gn');if(aptsGN&&aptsGN.list)MEM.aptitudes.gn=aptsGN.list;
    let aptsPN=await dbGetOne('aptitudes','pn');if(aptsPN&&aptsPN.list)MEM.aptitudes.pn=aptsPN.list;
    let roles=await dbGet('roles');
    roles.forEach(r=>{
      if(r.service==='gn'||r.service==='pn'){
        if(!customRoles[r.service])customRoles[r.service]=[];
        customRoles[r.service].push(r);
      }
    });
  }catch(e){console.warn('Init Firebase:',e);}

  // ── Auto-login depuis le portail index.html (sessionStorage) ──
  let autoId='', autoPw='', autoSvc='';
  try{
    autoId=sessionStorage.getItem('fdo_login_id')||'';
    autoPw=sessionStorage.getItem('fdo_login_pw')||'';
    autoSvc=sessionStorage.getItem('fdo_login_service')||'';
    sessionStorage.removeItem('fdo_login_id');
    sessionStorage.removeItem('fdo_login_pw');
    sessionStorage.removeItem('fdo_login_service');
  }catch{}

  if(autoId && autoPw && (autoSvc==='gn'||autoSvc==='pn')){
    let portal=$('portal');
    let loginScr=$('login-screen');
    if(portal) portal.style.display='none';
    if(loginScr) loginScr.style.display='none';
    await doAutoLogin(autoId, autoPw, autoSvc);
  } else {
    // Affichage normal login avec logo selon service détecté
    let svcDetect = new URLSearchParams(window.location.search).get('service')||'pn';
    if(!SERVICE) SERVICE=svcDetect;
    updateLoginLogo(SERVICE);
    $('login-screen').style.display='flex';
    $('lpw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  }
};

// Connexion automatique — appelée depuis le sessionStorage
async function doAutoLogin(id, pw, svc){
  SERVICE=svc;
  let u=null;

  // Firebase
  try{
    let snap=await db.collection('users').where('identifiant','==',id).where('service','==',svc).limit(1).get();
    if(!snap.empty){let d=snap.docs[0];let data=d.data();if(data.password===pw)u={uid:d.id,...data};}
  }catch{}

  // Fallback démo
  if(!u){
    let du=DEMO_USERS[id];
    if(du&&du.pw===pw&&du.service===svc) u={uid:id,identifiant:id,...du};
  }

  if(!u){
    // Auto-login échoué → afficher le portail interne normalement
    SERVICE=null;
    let portal=$('portal');
    if(portal) portal.style.display='flex';
    $('lpw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    return;
  }

  CU=u;
  await loadGradesForService(svc);
  let ls=$('login-screen');if(ls)ls.style.display='none';
  buildApp();
}
